<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magical Studio Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/editor/editor.main.min.css">
    <style>
        :root { --sidebar-width: 150px; --header-height: 45px; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #1e1e1e; color: #ccc; font-family: sans-serif; }
        
        /* ヘッダー */
        header { height: var(--header-height); background: #252526; display: flex; align-items: center; padding: 0 15px; justify-content: space-between; border-bottom: 1px solid #333; }
        .btn-group { display: flex; gap: 8px; }
        button { background: #333; color: white; border: 1px solid #444; padding: 5px 12px; border-radius: 3px; cursor: pointer; font-size: 12px; }
        button:hover { background: #444; }

        /* メインレイアウト */
        #main { display: flex; height: calc(100% - var(--header-height)); }
        
        /* サイドバー */
        #sidebar { width: var(--sidebar-width); background: #252526; border-right: 1px solid #333; display: flex; flex-direction: column; }
        .file-item { padding: 10px 15px; cursor: pointer; font-size: 13px; border-left: 3px solid transparent; }
        .file-item:hover { background: #2a2d2e; }
        .file-item.active { background: #37373d; border-left-color: #007acc; color: white; }

        /* エディタとプレビュー */
        #editor-container { flex: 1; height: 100%; }
        #preview-container { width: 40%; height: 100%; background: white; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        @media (max-width: 768px) {
            #main { flex-direction: column; }
            #sidebar { width: 100%; height: auto; flex-direction: row; }
            #preview-container { width: 100%; height: 40%; }
        }
    </style>
</head>
<body>

<header>
    <div><strong>Magical Studio Pro</strong></div>
    <div class="btn-group">
        <button onclick="fullPreview()">全画面プレビュー</button>
        <button onclick="downloadFile()">DL</button>
    </div>
</header>

<div id="main">
    <div id="sidebar">
        <div class="file-item active" onclick="switchFile('index.html')" id="tab-html">index.html</div>
        <div class="file-item" onclick="switchFile('style.css')" id="tab-css">style.css</div>
        <div class="file-item" onclick="switchFile('script.js')" id="tab-js">script.js</div>
    </div>
    <div id="editor-container" id="editor"></div>
    <div id="preview-container">
        <iframe id="preview"></iframe>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
<script>
    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' }});

    let editor;
    let currentFile = 'index.html';
    
    // LocalStorage または初期値
    const files = JSON.parse(localStorage.getItem('magical-files')) || {
        'index.html': '<html>\n<head>\n  <link rel="stylesheet" href="style.css">\n</head>\n<body>\n  <h1>Hello World</h1>\n  <script src="script.js"><\/script>\n</body>\n</html>',
        'style.css': 'body { background: #fff; text-align: center; color: #333; }',
        'script.js': 'console.log("Hello from JS!");'
    };

    require(['vs/editor/editor.main'], function() {
        editor = monaco.editor.create(document.getElementById('editor-container'), {
            value: files[currentFile],
            language: 'html',
            theme: 'vs-dark',
            automaticLayout: true,
            fontSize: 16
        });

        editor.onDidChangeModelContent(() => {
            files[currentFile] = editor.getValue();
            localStorage.setItem('magical-files', JSON.stringify(files));
            updatePreview();
        });

        updatePreview();
    });

    function switchFile(fileName) {
        currentFile = fileName;
        const lang = fileName.split('.')[1] === 'js' ? 'javascript' : fileName.split('.')[1];
        
        // エディタの言語と内容を切り替え
        monaco.editor.setModelLanguage(editor.getModel(), lang === 'html' ? 'html' : lang);
        editor.setValue(files[fileName]);

        // タブの見た目更新
        document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
        document.getElementById('tab-' + fileName.split('.')[1]).classList.add('active');
    }

    function updatePreview() {
        const preview = document.getElementById('preview');
        // HTMLの中にCSSとJSを注入して擬似的に再現
        const combinedCode = `
            ${files['index.html']}
            <style>${files['style.css']}</style>
            <script>${files['script.js']}<\/script>
        `;
        preview.srcdoc = combinedCode;
    }

    function fullPreview() {
        const win = window.open();
        win.document.write(`
            ${files['index.html']}
            <style>${files['style.css']}</style>
            <script>${files['script.js']}<\/script>
        `);
    }

    function downloadFile() {
        const blob = new Blob([files[currentFile]], {type: "text/plain"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = currentFile;
        a.click();
    }
</script>
</body>
</html>
