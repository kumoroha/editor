<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visual Studio Code Web+</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/editor/editor.main.min.css">
    <style>
        :root { --sidebar-width: 220px; --header-height: 35px; --vscode-blue: #007acc; --vscode-bg: #1e1e1e; --sidebar-bg: #252526; --header-bg: #323233; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--vscode-bg); color: #cccccc; font-family: 'Segoe UI', sans-serif; }
        
        /* ヘッダー */
        header { height: var(--header-height); background: var(--header-bg); display: flex; align-items: center; padding: 0 10px; justify-content: space-between; border-bottom: 1px solid #2b2b2b; }
        .header-left { display: flex; align-items: center; gap: 10px; color: #4fc1ff; font-weight: 500; font-size: 13px; }
        .header-right { display: flex; align-items: center; gap: 5px; }
        
        button { background: #3c3c3c; color: #eee; border: none; padding: 4px 10px; border-radius: 2px; cursor: pointer; font-size: 11px; }
        button:hover { background: #505050; }
        button.active { background: var(--vscode-blue); color: white; }
        .icon-btn { background: transparent; font-size: 16px; padding: 2px 5px; }
        .icon-btn:hover { background: #3c3c3c; }

        /* メイン */
        #main { display: flex; height: calc(100% - var(--header-height)); width: 100%; }
        
        /* サイドバー */
        #sidebar { width: var(--sidebar-width); background: var(--sidebar-bg); display: flex; flex-direction: column; border-right: 1px solid #333; transition: 0.2s; }
        #sidebar.hidden { width: 0; overflow: hidden; border: none; }
        .sidebar-title-row { padding: 10px 10px 5px 15px; font-size: 11px; font-weight: bold; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; color: #bbb; }
        
        #file-list { flex: 1; overflow-y: auto; }
        .file-item { padding: 5px 15px; cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; align-items: center; height: 22px; }
        .file-item:hover { background: #2a2d2e; }
        .file-item.active { background: #37373d; color: white; border-left: 2px solid var(--vscode-blue); }
        .del-icon { opacity: 0; font-size: 14px; transition: 0.2s; }
        .file-item:hover .del-icon { opacity: 0.6; }
        .del-icon:hover { opacity: 1 !important; color: #ff5555; }

        /* エディタとプレビュー */
        #editor-container { flex: 1; height: 100%; min-width: 0; }
        #preview-container { width: 0; height: 100%; background: white; border-left: 1px solid #333; transition: 0.3s; overflow: hidden; }
        #preview-container.visible { width: 50%; }
        iframe { width: 100%; height: 100%; border: none; }

        @media (max-width: 768px) {
            #preview-container.visible { width: 100%; height: 40%; border-left: none; border-top: 1px solid #333; }
            #main { flex-direction: column; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <button class="icon-btn" onclick="toggleSidebar()">☰</button>
        <span>Visual Studio Code Web+</span>
    </div>
    <div class="header-right">
        <button id="btn-split" onclick="toggleSplitPreview()">分割プレビュー</button>
        <button onclick="fullPreview()">全画面プレビュー</button>
        <button onclick="downloadCurrent()" style="background: #2d7d46;">ダウンロード</button>
    </div>
</header>

<div id="main">
    <div id="sidebar">
        <div class="sidebar-title-row">
            <span>エクスプローラー</span>
            <button class="icon-btn" onclick="addNewFile()" title="新しいファイル" style="color: #ccc;">＋</button>
        </div>
        <div id="file-list"></div>
    </div>
    <div id="editor-container"></div>
    <div id="preview-container">
        <iframe id="preview"></iframe>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
<script>
    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' }});

    let editor;
    let currentFile = 'index.html';
    // キーを維持して継続性を確保
    let files = JSON.parse(localStorage.getItem('vsc-web-files-v2')) || {
        'index.html': '<h1>Visual Studio Code Web+</h1>\n<p>エクスプローラーの「＋」でファイルを追加できます。</p>\n<link rel="stylesheet" href="style.css">',
        'style.css': 'h1 { color: #007acc; }'
    };

    require(['vs/editor/editor.main'], function() {
        editor = monaco.editor.create(document.getElementById('editor-container'), {
            value: files[currentFile] || "",
            language: getLanguage(currentFile),
            theme: 'vs-dark',
            automaticLayout: true,
            fontSize: 16,
            wordWrap: "on",
            minimap: { enabled: false }
        });

        editor.onDidChangeModelContent(() => {
            files[currentFile] = editor.getValue();
            saveFiles();
            updatePreview();
        });

        renderFileList();
        updatePreview();
    });

    function getLanguage(filename) {
        const ext = filename.split('.').pop().toLowerCase();
        const map = { html: 'html', css: 'css', js: 'javascript', ts: 'typescript', json: 'json', md: 'markdown', php: 'php' };
        // 拡張子がない、またはマップにない場合は 'plaintext'
        return map[ext] || 'plaintext';
    }

    function renderFileList() {
        const list = document.getElementById('file-list');
        list.innerHTML = '';
        Object.keys(files).sort().forEach(name => {
            const div = document.createElement('div');
            div.className = `file-item ${name === currentFile ? 'active' : ''}`;
            div.innerHTML = `<span>${name}</span><span class="del-icon" onclick="deleteFile(event, '${name}')">×</span>`;
            div.onclick = () => switchFile(name);
            list.appendChild(div);
        });
    }

    function switchFile(name) {
        currentFile = name;
        const lang = getLanguage(name);
        monaco.editor.setModelLanguage(editor.getModel(), lang);
        editor.setValue(files[name]);
        renderFileList();
    }

    function addNewFile() {
        const name = prompt("新しいファイル名を入力してください\n(拡張子がない場合はテキストとして保存されます)");
        if (name && !files[name]) {
            files[name] = "";
            saveFiles();
            switchFile(name);
        } else if (files[name]) {
            alert("同名のファイルが既に存在します");
        }
    }

    function deleteFile(e, name) {
        e.stopPropagation();
        if (Object.keys(files).length <= 1) return;
        if (confirm(`${name} を削除しますか？`)) {
            delete files[name];
            if (currentFile === name) currentFile = Object.keys(files)[0];
            saveFiles();
            switchFile(currentFile);
        }
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('hidden');
    }

    function toggleSplitPreview() {
        const pc = document.getElementById('preview-container');
        const btn = document.getElementById('btn-split');
        pc.classList.toggle('visible');
        btn.classList.toggle('active');
    }

    function saveFiles() {
        localStorage.setItem('vsc-web-files-v2', JSON.stringify(files));
    }

    function updatePreview() {
        const preview = document.getElementById('preview');
        let html = files['index.html'] || "";
        if (files['style.css']) html += `<style>${files['style.css']}</style>`;
        if (files['script.js']) html += `<script>${files['script.js']}<\/script>`;
        preview.srcdoc = html;
    }

    function fullPreview() {
        const win = window.open();
        win.document.write(document.getElementById('preview').srcdoc);
    }

    function downloadCurrent() {
        const blob = new Blob([files[currentFile]], {type: "text/plain"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = currentFile;
        a.click();
    }
</script>
</body>
</html>
