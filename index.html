<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Visual Studio Code Web+</title>
    <link rel="manifest" href="data:application/manifest+json,{'name':'VSCodeWeb','short_name':'VSCodeWeb','start_url':'.','display':'standalone'}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/editor/editor.main.min.css">
    <style>
        :root { 
            --sidebar-width: 220px; --header-height: 55px; --toolbar-height: 40px;
            --vscode-blue: #007acc; --bg: #1e1e1e; --side-bg: #252526; --head-bg: #323233; --text: #eee;
        }
        body.light { --bg: #ffffff; --side-bg: #f3f3f3; --head-bg: #2c2c2c; --text: #333; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; }
        header { height: var(--header-height); background: var(--head-bg); display: flex; align-items: center; padding: 0 15px; justify-content: space-between; border-bottom: 1px solid #2b2b2b; color: white; }
        .header-left { display: flex; align-items: center; gap: 12px; color: #4fc1ff; font-weight: bold; font-size: 19px; }
        .header-right { display: flex; align-items: center; gap: 8px; }
        button { background: #444; color: #eee; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; }
        button:hover { background: #555; }
        button.active { background: var(--vscode-blue); color: white; }
        .menu-icon { font-size: 22px; font-weight: normal; background: transparent; padding: 0 5px; color: #fff; }
        #main { display: flex; height: calc(100% - var(--header-height)); width: 100%; }
        #sidebar { width: var(--sidebar-width); background: var(--side-bg); display: flex; flex-direction: column; border-right: 1px solid #333; transition: 0.2s; }
        #sidebar.hidden { width: 0; overflow: hidden; border: none; }
        .sidebar-title-row { padding: 5px 10px 5px 15px; font-size: 11px; font-weight: bold; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; color: #888; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .add-btn { background:transparent; color:#007acc; font-size: 22px; font-weight: 300; padding: 0; }
        #file-list { flex: 1; overflow-y: auto; }
        .file-item { padding: 8px 15px; cursor: pointer; font-size: 14px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid transparent; color: #eee; }
        .file-item:hover { background: rgba(255,255,255,0.05); }
        .file-item.active { background: rgba(0, 122, 204, 0.2); color: #4fc1ff; border-left-color: var(--vscode-blue); font-weight: bold; }
        #editor-wrapper { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        #toolbar { height: var(--toolbar-height); background: var(--side-bg); display: flex; align-items: center; padding: 0 10px; gap: 5px; border-bottom: 1px solid #333; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .tool-btn { background: #3c3c3c; padding: 5px 8px; font-family: monospace; font-size: 14px; min-width: 32px; border-radius: 3px; }
        #editor-container { flex: 1; width: 100%; }
        #preview-container { width: 0; height: 100%; background: white; transition: 0.3s; overflow: hidden; }
        #preview-container.visible { width: 50%; border-left: 1px solid #333; }
        iframe { width: 100%; height: 100%; border: none; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; }
        #settings-modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #252526; color: white; padding: 25px; border-radius: 8px; border: 1px solid #444; z-index: 1000; width: 320px;
        }
        .setting-item { margin-bottom: 15px; }
        .setting-item label { display: block; margin-bottom: 5px; font-size: 12px; color: #aaa; }
        select, input { width: 100%; padding: 8px; background: #3c3c3c; color: white; border: 1px solid #555; border-radius: 4px; box-sizing: border-box; }
        @media (max-width: 768px) { #preview-container.visible { width: 100%; height: 40%; border-left: none; border-top: 1px solid #333; } #main { flex-direction: column; } }
    </style>
</head>
<body class="dark">

<header>
    <div class="header-left">
        <button class="menu-icon" onclick="toggleSidebar()">≡</button>
        <span>Visual Studio Code Web+</span>
    </div>
    <div class="header-right">
        <button id="btn-split" onclick="toggleSplitPreview()">分割プレビュー</button>
        <button onclick="fullPreview()">全画面プレビュー</button>
        <button onclick="openDownloadMenu()" style="background: #2d7d46;">ダウンロード</button>
        <button onclick="toggleSettings()" style="background: #666;">⚙ 設定</button>
    </div>
</header>

<div id="main">
    <div id="sidebar">
        <div class="sidebar-title-row"><span>エクスプローラー</span><button class="add-btn" onclick="addNewFile()">+</button></div>
        <div id="file-list"></div>
    </div>
    <div id="editor-wrapper">
        <div id="toolbar">
            <button class="tool-btn" onclick="insertText('\t')">Tab</button>
            <button class="tool-btn" onclick="insertText('{')">{</button><button class="tool-btn" onclick="insertText('}')">}</button>
            <button class="tool-btn" onclick="insertText('[')">[</button><button class="tool-btn" onclick="insertText(']')">]</button>
            <button class="tool-btn" onclick="insertText('(')">(</button><button class="tool-btn" onclick="insertText(')')">)</button>
            <button class="tool-btn" onclick="insertText('<')">&lt;</button><button class="tool-btn" onclick="insertText('>')">&gt;</button>
            <button class="tool-btn" onclick="insertText(':')">:</button><button class="tool-btn" onclick="insertText('=')">=</button>
            <button class="tool-btn" onclick="insertText('!')">!</button><button class="tool-btn" onclick="insertText('\"')">"</button>
            <button class="tool-btn" onclick="insertText('/')">/</button><button class="tool-btn" onclick="insertText(';')">;</button>
            <button class="tool-btn" onclick="insertText('\'')">'</button>
            <button class="tool-btn" onclick="updatePreview(true)" id="manual-refresh" style="display:none; background:var(--vscode-blue);">更新</button>
        </div>
        <div id="editor-container"></div>
    </div>
    <div id="preview-container"><iframe id="preview"></iframe></div>
</div>

<div class="modal-overlay" id="overlay" onclick="toggleSettings()"></div>
<div id="settings-modal">
    <h3>⚙ 設定</h3>
    <div class="setting-item"><label>テーマ</label><select id="setting-theme" onchange="updateSettings()"><option value="vs-dark">ダーク</option><option value="vs">ライト</option></select></div>
    <div class="setting-item"><label>文字サイズ</label><input type="number" id="setting-fontsize" onchange="updateSettings()"></div>
    <div class="setting-item"><label>インデント (スペース数)</label><select id="setting-tabsize" onchange="updateSettings()"><option value="2">2</option><option value="4">4</option><option value="8">8</option></select></div>
    <div class="setting-item"><label>プレビュー自動更新</label><select id="setting-auto-refresh" onchange="updateSettings()"><option value="true">ON</option><option value="false">OFF</option></select></div>
    <hr style="border:0; border-top:1px solid #444;">
    <button onclick="exportAllData()" style="width:100%; margin-bottom:5px;">一括バックアップ (JSON)</button>
    <button onclick="document.getElementById('import-file').click()" style="width:100%;">インポート</button>
    <input type="file" id="import-file" style="display:none" onchange="importAllData(event)">
    <button onclick="clearAllData()" style="background:#a94442; width:100%; margin-top:10px;">データ消去</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
<script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('data:text/javascript,self.addEventListener("fetch", (e) => e.respondWith(fetch(e.request)))'); }
    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' }});
    let editor, currentFile = 'index.html';
    let files = JSON.parse(localStorage.getItem('vsc-web-files-v7')) || { 'index.html': '<h1>Visual Studio Code Web+</h1>' };
    let config = JSON.parse(localStorage.getItem('vsc-web-config-v7')) || { theme: 'vs-dark', fontSize: 16, tabSize: 4, autoRefresh: true };

    require(['vs/editor/editor.main'], function() {
        editor = monaco.editor.create(document.getElementById('editor-container'), {
            value: files[currentFile], language: getLanguage(currentFile), theme: config.theme, fontSize: config.fontSize, tabSize: config.tabSize, automaticLayout: true
        });
        editor.onDidChangeModelContent(() => { files[currentFile] = editor.getValue(); saveData(); if(config.autoRefresh) updatePreview(); });
        initUI(); renderFileList(); updatePreview();
    });

    function getLanguage(f) {
        const ext = f.split('.').pop().toLowerCase();
        const map = { html:'html', css:'css', js:'javascript', ts:'typescript', cpp:'cpp', c:'c', cs:'csharp', py:'python', sql:'sql', xml:'xml', yaml:'yaml', json:'json', md:'markdown' };
        return map[ext] || 'plaintext';
    }
    function insertText(t) { editor.executeEdits("", [{ range: editor.getSelection(), text: t, forceMoveMarkers: true }]); editor.focus(); }
    function renderFileList() {
        const list = document.getElementById('file-list'); list.innerHTML = '';
        Object.keys(files).sort().forEach(name => {
            const div = document.createElement('div'); div.className = `file-item ${name===currentFile?'active':''}`;
            div.innerHTML = `<span>${name}</span><span onclick="deleteFile(event,'${name}')">×</span>`;
            div.onclick = () => { currentFile = name; editor.setValue(files[name]); monaco.editor.setModelLanguage(editor.getModel(), getLanguage(name)); renderFileList(); };
            list.appendChild(div);
        });
    }
    function addNewFile() { const name = prompt("作成するファイル名:"); if(name && !files[name]) { files[name] = ""; saveData(); currentFile = name; renderFileList(); editor.setValue(""); } }
    function deleteFile(e, n) { e.stopPropagation(); if(confirm(n+"を削除？")){ delete files[n]; currentFile = Object.keys(files)[0]; renderFileList(); editor.setValue(files[currentFile]); saveData(); } }
    function updateSettings() {
        config.theme = document.getElementById('setting-theme').value;
        config.fontSize = parseInt(document.getElementById('setting-fontsize').value);
        config.tabSize = parseInt(document.getElementById('setting-tabsize').value);
        config.autoRefresh = document.getElementById('setting-auto-refresh').value === 'true';
        monaco.editor.setTheme(config.theme); 
        editor.updateOptions({ fontSize: config.fontSize, tabSize: config.tabSize });
        document.body.className = config.theme === 'vs' ? 'light' : 'dark';
        document.getElementById('manual-refresh').style.display = config.autoRefresh ? 'none' : 'block';
        localStorage.setItem('vsc-web-config-v7', JSON.stringify(config));
    }
    function initUI() {
        document.getElementById('setting-theme').value = config.theme;
        document.getElementById('setting-fontsize').value = config.fontSize;
        document.getElementById('setting-tabsize').value = config.tabSize;
        document.getElementById('setting-auto-refresh').value = config.autoRefresh.toString();
        document.body.className = config.theme === 'vs' ? 'light' : 'dark';
    }
    function exportAllData() { const blob = new Blob([JSON.stringify({files, config})], {type:"application/json"}); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "backup.json"; a.click(); }
    function importAllData(e) {
        const reader = new FileReader();
        reader.onload = (ev) => { const d = JSON.parse(ev.target.result); files = d.files; config = d.config; saveData(); location.reload(); };
        reader.readAsText(e.target.files[0]);
    }
    function openDownloadMenu() { const choice = prompt("DLするファイル名:", currentFile); if(choice && files[choice]){ const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([files[choice]])); a.download = choice; a.click(); } }
    function saveData() { localStorage.setItem('vsc-web-files-v7', JSON.stringify(files)); }
    function toggleSettings() { const s = document.getElementById('settings-modal').style; const o = document.getElementById('overlay').style; s.display = s.display === 'block' ? 'none' : 'block'; o.display = o.display === 'block' ? 'none' : 'block'; }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('hidden'); }
    function toggleSplitPreview() { document.getElementById('preview-container').classList.toggle('visible'); document.getElementById('btn-split').classList.toggle('active'); }
    function updatePreview(force = false) { if(!config.autoRefresh && !force) return; let html = files['index.html'] || ""; if(files['style.css']) html += `<style>${files['style.css']}</style>`; if(files['script.js']) html += `<script>${files['script.js']}<\/script>`; document.getElementById('preview').srcdoc = html; }
    function fullPreview() { const win = window.open(); win.document.write(document.getElementById('preview').srcdoc); }
    function clearAllData() { if(confirm("消去しますか？")){ localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
