<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visual Studio Code Web+</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/editor/editor.main.min.css">
    <style>
        :root { --sidebar-width: 200px; --header-height: 45px; --vscode-bg: #1e1e1e; --sidebar-bg: #252526; --header-bg: #323233; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--vscode-bg); color: #cccccc; font-family: 'Segoe UI', sans-serif; }
        
        /* ヘッダー */
        header { height: var(--header-height); background: var(--header-bg); display: flex; align-items: center; padding: 0 10px; justify-content: space-between; border-bottom: 1px solid #2b2b2b; }
        .header-left, .header-right { display: flex; align-items: center; gap: 8px; }
        button { background: #3c3c3c; color: white; border: none; padding: 6px 12px; border-radius: 3px; cursor: pointer; font-size: 12px; transition: 0.2s; }
        button:hover { background: #505050; }
        button.active { background: #007acc; }

        /* メインレイアウト */
        #main { display: flex; height: calc(100% - var(--header-height)); width: 100%; }
        
        /* サイドバー */
        #sidebar { width: var(--sidebar-width); background: var(--sidebar-bg); display: flex; flex-direction: column; border-right: 1px solid #333; transition: 0.3s; }
        #sidebar.hidden { width: 0; overflow: hidden; border: none; }
        .sidebar-title { padding: 12px; font-size: 11px; font-weight: bold; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; white-space: nowrap; }
        
        #file-list { flex: 1; overflow-y: auto; }
        .file-item { padding: 8px 15px; cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; align-items: center; white-space: nowrap; }
        .file-item:hover { background: #2a2d2e; }
        .file-item.active { background: #37373d; color: white; border-left: 2px solid #007acc; }

        /* エディタとプレビュー */
        #editor-container { flex: 1; height: 100%; min-width: 0; }
        
        #preview-container { width: 0; height: 100%; background: white; border-left: 1px solid #333; transition: 0.3s; overflow: hidden; }
        #preview-container.visible { width: 50%; }
        iframe { width: 100%; height: 100%; border: none; }

        @media (max-width: 768px) {
            #preview-container.visible { width: 100%; height: 40%; border-left: none; border-top: 1px solid #333; }
            #main { flex-direction: column; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <button onclick="toggleSidebar()" title="サイドバー切替">☰</button>
        <strong>Visual Studio Code Web+</strong>
    </div>
    <div class="header-right">
        <button id="btn-split" onclick="toggleSplitPreview()">分割プレビュー</button>
        <button onclick="fullPreview()">全画面</button>
        <button onclick="addNewFile()">＋新ファイル</button>
        <button onclick="downloadCurrent()" style="background: #2d7d46;">DL</button>
    </div>
</header>

<div id="main">
    <div id="sidebar">
        <div class="sidebar-title">エクスプローラー</div>
        <div id="file-list"></div>
    </div>

    <div id="editor-container"></div>

    <div id="preview-container">
        <iframe id="preview"></iframe>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
<script>
    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' }});

    let editor;
    let currentFile = 'index.html';
    let files = JSON.parse(localStorage.getItem('vsc-web-files-v2')) || {
        'index.html': '\n<h1>Hello!</h1>\n<p>右上のボタンでプレビューしてね</p>\n<link rel="stylesheet" href="style.css">',
        'style.css': 'h1 { color: #ff69b4; }',
        'memo.txt': 'iPadでのコーディングも快適に。'
    };

    require(['vs/editor/editor.main'], function() {
        editor = monaco.editor.create(document.getElementById('editor-container'), {
            value: files[currentFile],
            language: getLanguage(currentFile),
            theme: 'vs-dark',
            automaticLayout: true,
            fontSize: 16,
            wordWrap: "on"
        });

        editor.onDidChangeModelContent(() => {
            files[currentFile] = editor.getValue();
            saveFiles();
            updatePreview();
        });

        renderFileList();
        updatePreview();
    });

    function getLanguage(filename) {
        const ext = filename.split('.').pop();
        const map = { html: 'html', css: 'css', js: 'javascript', ts: 'typescript', json: 'json', md: 'markdown' };
        return map[ext] || 'plaintext';
    }

    function renderFileList() {
        const list = document.getElementById('file-list');
        list.innerHTML = '';
        Object.keys(files).forEach(name => {
            const div = document.createElement('div');
            div.className = `file-item ${name === currentFile ? 'active' : ''}`;
            div.innerHTML = `<span>${name}</span><span style="opacity:0.5" onclick="deleteFile(event, '${name}')">×</span>`;
            div.onclick = () => switchFile(name);
            list.appendChild(div);
        });
    }

    function switchFile(name) {
        currentFile = name;
        monaco.editor.setModelLanguage(editor.getModel(), getLanguage(name));
        editor.setValue(files[name]);
        renderFileList();
    }

    function addNewFile() {
        const name = prompt("ファイル名を入力");
        if (name && !files[name]) {
            files[name] = "";
            saveFiles();
            switchFile(name);
        }
    }

    function deleteFile(e, name) {
        e.stopPropagation();
        if (Object.keys(files).length <= 1) return;
        if (confirm(`${name} を削除？`)) {
            delete files[name];
            if (currentFile === name) currentFile = Object.keys(files)[0];
            saveFiles();
            switchFile(currentFile);
        }
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('hidden');
    }

    function toggleSplitPreview() {
        const pc = document.getElementById('preview-container');
        const btn = document.getElementById('btn-split');
        pc.classList.toggle('visible');
        btn.classList.toggle('active');
    }

    function saveFiles() {
        localStorage.setItem('vsc-web-files-v2', JSON.stringify(files));
    }

    function updatePreview() {
        const preview = document.getElementById('preview');
        let html = files['index.html'] || "";
        if (files['style.css']) html += `<style>${files['style.css']}</style>`;
        if (files['script.js']) html += `<script>${files['script.js']}<\/script>`;
        preview.srcdoc = html;
    }

    function fullPreview() {
        const win = window.open();
        win.document.write(document.getElementById('preview').srcdoc);
    }

    function downloadCurrent() {
        const blob = new Blob([files[currentFile]], {type: "text/plain"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = currentFile;
        a.click();
    }
</script>
</body>
</html>
