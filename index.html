<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Visual Studio Code Web+</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/editor/editor.main.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <style>
        :root { 
            --sidebar-width: 220px; --header-height: 55px; --toolbar-height: 40px; --tab-height: 35px; --status-height: 25px;
            --vscode-blue: #007acc; --bg: #1e1e1e; --side-bg: #252526; --head-bg: #323233; --text: #eee; --border: #333;
        }
        body.light { --bg: #ffffff; --side-bg: #f3f3f3; --head-bg: #2c2c2c; --text: #333; --border: #ddd; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; }
        
        header { height: var(--header-height); background: var(--head-bg); display: flex; align-items: center; padding: 0 15px; justify-content: space-between; border-bottom: 1px solid #2b2b2b; color: white; box-sizing: border-box; z-index: 100; }
        .header-left { display: flex; align-items: center; gap: 12px; color: #4fc1ff; font-weight: bold; font-size: 19px; }
        
        #main { display: flex; height: calc(100% - var(--header-height) - var(--status-height)); width: 100%; position: relative; }
        #sidebar { width: var(--sidebar-width); background: var(--side-bg); display: flex; flex-direction: column; border-right: 1px solid var(--border); transition: width 0.2s; flex-shrink: 0; z-index: 10; }
        #sidebar.hidden { width: 0; border: none; overflow: hidden; }
        
        #editor-wrapper { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); position: relative; height: 100%; }
        #tabs-container { height: var(--tab-height); background: #2d2d2d; display: flex; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--border); }
        body.light #tabs-container { background: #ececec; }
        
        .tab { padding: 0 10px 0 15px; height: 100%; display: flex; align-items: center; background: #2d2d2d; font-size: 12px; cursor: pointer; border-right: 1px solid var(--border); color: #999; white-space: nowrap; }
        body.light .tab { background: #e1e1e1; color: #666; }
        .tab.active { background: var(--bg); color: white; border-top: 1px solid var(--vscode-blue); }
        body.light .tab.active { color: #333; border-top: 2px solid var(--vscode-blue); background: var(--bg); }
        .close-tab-btn { margin-left: 10px; padding: 2px 6px; border-radius: 3px; font-size: 14px; }
        .close-tab-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

        #toolbar { height: var(--toolbar-height); background: var(--side-bg); display: flex; align-items: center; padding: 0 10px; gap: 5px; border-bottom: 1px solid var(--border); overflow-x: auto; flex-shrink: 0; }
        .tool-btn { background: #3c3c3c; padding: 5px 8px; font-size: 14px; border-radius: 3px; color: #eee; border: none; flex-shrink: 0; }
        body.light .tool-btn { background: #ddd; color: #333; }

        #status-bar { height: var(--status-height); background: var(--vscode-blue); color: white; display: flex; align-items: center; padding: 0 30px; font-size: 11px; justify-content: space-between; z-index: 100; }
        
        #editor-container { flex: 1; width: 100%; height: 100%; }
        
        /* 設定画面とウェルカム画面のオーバーレイ制御 */
        #welcome-screen, #settings-view { position: absolute; top: var(--tab-height); left: 0; width: 100%; height: calc(100% - var(--tab-height)); background: var(--bg); z-index: 50; display: none; flex-direction: column; align-items: center; justify-content: center; overflow-y: auto; }
        #settings-view { padding: 40px; box-sizing: border-box; align-items: flex-start; justify-content: flex-start; }

        #preview-container { width: 0; height: 100%; background: white; transition: width 0.3s; overflow: hidden; flex-shrink: 0; border-left: 1px solid var(--border); }
        #preview-container.visible { width: 50%; }
        
        .file-item { padding: 8px 10px; cursor: pointer; font-size: 13px; display: flex; align-items: center; color: var(--text); }
        .file-item.active { background: rgba(0, 122, 204, 0.15); border-left: 2px solid var(--vscode-blue); }
        .file-actions { margin-left: auto; opacity: 0; }
        .file-item:hover .file-actions { opacity: 1; }

        .custom-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #252526; color: white; padding: 25px; border-radius: 8px; border: 1px solid #444; z-index: 1000; width: 340px; }
        body.light .custom-modal { background: #fff; color: #333; border: 1px solid #ccc; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; }
        
        input, select { width: 100%; padding: 8px; margin-top: 5px; background: #3c3c3c; color: #fff; border: 1px solid #555; border-radius: 4px; }
        body.light input, body.light select { background: #fff; color: #333; border: 1px solid #ccc; }
    </style>
</head>
<body class="dark">

<header>
    <div class="header-left"><button onclick="toggleSidebar()" style="background:none; color:white; font-size:22px; border:none;">≡</button><span>Visual Studio Code Web+</span></div>
    <div class="header-right">
        <button onclick="toggleSplitPreview()" style="background:#444; color:white; border-radius:4px; padding:6px 12px; border:none; margin-right:5px;">プレビュー</button>
        <button onclick="toggleModal('download-modal')" style="background: #2d7d46; color: white; border-radius:4px; padding:6px 12px; border:none; margin-right:5px;">保存</button>
        <button onclick="openSettingsTab()" style="background: #666; color: white; border-radius:4px; padding:6px 12px; border:none;">⚙ 設定</button>
    </div>
</header>

<div id="main">
    <div id="sidebar">
        <div style="padding:10px; font-size:11px; font-weight:bold; color:#888; display:flex; justify-content:space-between; align-items:center;">
            エクスプローラー
            <div>
                <button onclick="addNewFile()" style="background:none; color:var(--vscode-blue); font-size:18px; border:none; cursor:pointer;" title="新規ファイル">+</button>
                <button onclick="document.getElementById('import-single').click()" style="background:none; color:var(--vscode-blue); font-size:16px; border:none; cursor:pointer;" title="アップロード">⇪</button>
            </div>
        </div>
        <div id="file-list"></div>
        <input type="file" id="import-single" style="display:none" onchange="importSingleFile(event)">
    </div>
    
    <div id="editor-wrapper">
        <div id="tabs-container"></div>
        
        <div id="welcome-screen">
            <h2 style="font-weight:normal; color:var(--vscode-blue);">VS Code Web+</h2>
            <button onclick="addNewFile()" style="width:280px; padding:15px; margin:10px; background:#333; color:white; border:1px solid #444; text-align:left; border-radius:6px;">📄 新規ファイルを作成</button>
            <button onclick="document.getElementById('import-single').click()" style="width:280px; padding:15px; margin:10px; background:#333; color:white; border:1px solid #444; text-align:left; border-radius:6px;">⇪ ファイルをアップロード</button>
        </div>

        <div id="settings-view">
            <h2 style="font-weight:normal; margin-bottom:20px;">エディタ設定</h2>
            <div style="width:100%; max-width:500px;">
                <label>テーマ</label><select id="setting-theme" onchange="updateSettings()"><option value="vs-dark">Dark</option><option value="vs">Light</option></select><br><br>
                <label>文字サイズ</label><input type="number" id="setting-fontsize" onchange="updateSettings()"><br><br>
                <label>行の折り返し</label><select id="setting-wrap" onchange="updateSettings()"><option value="on">On</option><option value="off">Off</option></select><br><br>
                <label>ミニマップ</label><select id="setting-minimap" onchange="updateSettings()"><option value="true">表示</option><option value="false">非表示</option></select><br><br>
                <hr style="border:0; border-top:1px solid var(--border); margin:20px 0;">
                <button onclick="clearAllData()" style="background:#a94442; color:white; padding:10px; width:100%; border:none; border-radius:4px;">全データをリセット</button>
                <button onclick="closeSettings()" style="background:#444; color:white; padding:10px; width:100%; border:none; border-radius:4px; margin-top:10px;">設定を閉じる</button>
            </div>
        </div>

        <div id="toolbar">
            <button class="tool-btn" onclick="insertText('\t')">Tab</button>
            <button class="tool-btn" onclick="insertText('{')">{</button><button class="tool-btn" onclick="insertText('}')">}</button>
            <button class="tool-btn" onclick="insertText('(')">(</button><button class="tool-btn" onclick="insertText(')')">)</button>
            <button class="tool-btn" onclick="insertText('<')">&lt;</button><button class="tool-btn" onclick="insertText('>')">&gt;</button>
            <button class="tool-btn" onclick="insertText('\"')">"</button><button class="tool-btn" onclick="insertText('\'')">'</button>
            <button class="tool-btn" onclick="insertText('/')">/</button><button class="tool-btn" onclick="insertText(';')">;</button>
            <div style="flex:1"></div>
            <button class="tool-btn" onclick="editor.focus(); editor.getAction('actions.find').run();" style="background:var(--vscode-blue);">🔍 検索</button>
        </div>
        <div id="editor-container"></div>
    </div>
    
    <div id="preview-container">
        <iframe id="preview" style="width:100%; height:100%; border:none; background:white;"></iframe>
        <div id="md-preview" style="display:none; padding:20px; color:#333; background:#fff; height:100%; overflow-y:auto; box-sizing:border-box;"></div>
    </div>
</div>

<div id="status-bar">
    <div id="status-left">Ready</div>
    <div id="status-right">UTF-8 | <span id="status-lang">plaintext</span></div>
</div>

<div id="tab-context-menu" style="position:fixed; display:none; background:#252526; border:1px solid #454545; z-index:2000; min-width:150px; padding:5px 0; border-radius:4px;">
    <div class="menu-item" onclick="formatDocument()" style="padding:8px 15px; cursor:pointer; font-size:13px;">ドキュメントの整形</div>
</div>
<div class="modal-overlay" id="overlay" onclick="closeAllModals()"></div>
<div id="download-modal" class="custom-modal">
    <h3>📥 ダウンロード</h3>
    <div id="dl-checklist" style="max-height:200px; overflow-y:auto; margin:15px 0; border:1px solid #555; padding:10px;"></div>
    <button onclick="downloadMultiFiles()" style="width:100%; background:var(--vscode-blue); color:white; border:none; padding:10px; border-radius:4px;">バックアップを保存</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
<script>
    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' }});
    let editor, currentFile = null, openTabs = [];
    let files = JSON.parse(localStorage.getItem('vsc-web-files-v24')) || { 'index.html': '<h1>Hello</h1>' };
    let config = JSON.parse(localStorage.getItem('vsc-web-config-v24')) || { theme: 'vs-dark', fontSize: 16, tabSize: 4, wrap: 'on', minimap: false };

    const UNSUPPORTED = ['png', 'jpg', 'jpeg', 'gif', 'webp', 'pdf', 'zip', 'mp3', 'mp4'];

    require(['vs/editor/editor.main'], function() {
        editor = monaco.editor.create(document.getElementById('editor-container'), {
            value: "", language: 'html', theme: config.theme, fontSize: config.fontSize, 
            wordWrap: config.wrap, minimap: { enabled: config.minimap === true || config.minimap === 'true' }, automaticLayout: true
        });

        editor.onDidChangeModelContent(() => { if(currentFile) { files[currentFile] = editor.getValue(); saveToLocalStorage(); updatePreview(); } });
        editor.onDidChangeCursorPosition(e => { document.getElementById('status-left').innerText = `行 ${e.position.lineNumber}, 列 ${e.position.column}`; });

        initUI();
        if(Object.keys(files).length > 0) switchFile(Object.keys(files)[0]);
        window.addEventListener('click', () => { document.getElementById('tab-context-menu').style.display = 'none'; });
    });

    function getLanguage(f) {
        const ext = f.split('.').pop().toLowerCase();
        const map = { html:'html', css:'css', js:'javascript', py:'python', md:'markdown', json:'json', php:'php', sql:'sql' };
        return map[ext] || 'plaintext';
    }

    function switchFile(name) {
        if(!name) { currentFile = null; openTabs = []; updateViewVisibility(); return; }
        currentFile = name;
        if(!openTabs.includes(name)) openTabs.push(name);
        
        document.getElementById('settings-view').style.display = 'none';
        editor.setValue(files[name] || "");
        monaco.editor.setModelLanguage(editor.getModel(), getLanguage(name));
        document.getElementById('status-lang').innerText = getLanguage(name);
        
        renderFileList(); renderTabs(); updateViewVisibility();
    }

    function renderFileList() {
        const list = document.getElementById('file-list'); list.innerHTML = '';
        Object.keys(files).sort().forEach(name => {
            const div = document.createElement('div'); div.className = `file-item ${name===currentFile?'active':''}`;
            div.innerHTML = `<span onclick="switchFile('${name}')" style="flex:1;">${name}</span>
                <span onclick="deleteFile(event,'${name}')" class="file-actions">×</span>`;
            list.appendChild(div);
        });
    }

    function renderTabs() {
        const container = document.getElementById('tabs-container'); container.innerHTML = '';
        openTabs.forEach(name => {
            const tab = document.createElement('div'); tab.className = `tab ${name===currentFile?'active':''}`;
            tab.innerHTML = `<span>${name}</span><span class="close-tab-btn" onclick="closeTab(event,'${name}')">×</span>`;
            tab.onclick = () => switchFile(name);
            tab.oncontextmenu = (e) => { e.preventDefault(); const menu = document.getElementById('tab-context-menu'); menu.style.display = 'block'; menu.style.left = e.pageX + 'px'; menu.style.top = e.pageY + 'px'; };
            container.appendChild(tab);
        });
    }

    function updateViewVisibility() {
        const hasTabs = openTabs.length > 0;
        const isSetting = document.getElementById('settings-view').style.display === 'block';
        
        document.getElementById('welcome-screen').style.display = (!hasTabs && !isSetting) ? 'flex' : 'none';
        document.getElementById('toolbar').style.display = (hasTabs && !isSetting) ? 'flex' : 'none';
        document.getElementById('editor-container').style.display = (hasTabs && !isSetting) ? 'block' : 'none';
        
        if (!hasTabs || isSetting) {
            document.getElementById('preview-container').style.width = '0';
        }

        if(editor) editor.layout();
        updatePreview();
    }

    function openSettingsTab() { 
        document.getElementById('settings-view').style.display = 'block'; 
        updateViewVisibility(); 
        renderTabs();
    }
    
    function closeSettings() { 
        document.getElementById('settings-view').style.display = 'none'; 
        if(openTabs.length > 0) switchFile(currentFile || openTabs[0]);
        else updateViewVisibility();
    }

    function updateSettings() {
        config.theme = document.getElementById('setting-theme').value;
        config.fontSize = parseInt(document.getElementById('setting-fontsize').value);
        config.wrap = document.getElementById('setting-wrap').value;
        config.minimap = document.getElementById('setting-minimap').value === 'true';
        monaco.editor.setTheme(config.theme);
        editor.updateOptions({ fontSize: config.fontSize, wordWrap: config.wrap, minimap: { enabled: config.minimap } });
        document.body.className = config.theme === 'vs' ? 'light' : 'dark';
        localStorage.setItem('vsc-web-config-v24', JSON.stringify(config));
    }

    function initUI() {
        document.getElementById('setting-theme').value = config.theme;
        document.getElementById('setting-fontsize').value = config.fontSize;
        document.getElementById('setting-wrap').value = config.wrap;
        document.getElementById('setting-minimap').value = config.minimap.toString();
        document.body.className = config.theme === 'vs' ? 'light' : 'dark';
    }

    function closeTab(e, n) { 
        e.stopPropagation(); 
        openTabs = openTabs.filter(t => t !== n); 
        if(currentFile === n) {
            if(openTabs.length > 0) switchFile(openTabs[openTabs.length-1]);
            else { currentFile = null; updateViewVisibility(); renderTabs(); }
        } else {
            renderTabs();
        }
    }

    function addNewFile() { 
        const name = prompt("ファイル名 (例: index.html):"); 
        if (name) {
            const ext = name.split('.').pop().toLowerCase();
            if(UNSUPPORTED.includes(ext)) { if(!confirm("編集不可の形式ですが作成しますか？")) return; }
            if(!files[name]) files[name] = ""; 
            switchFile(name); 
        } 
    }

    function toggleSplitPreview() {
        const pc = document.getElementById('preview-container');
        if(pc.style.width === '50%') pc.style.width = '0';
        else pc.style.width = '50%';
        setTimeout(()=>editor.layout(), 310);
        updatePreview();
    }

    function updatePreview() {
        if(!currentFile) return;
        const isMd = currentFile.endsWith('.md'), ifr = document.getElementById('preview'), md = document.getElementById('md-preview');
        if(isMd) { ifr.style.display='none'; md.style.display='block'; md.innerHTML=marked.parse(files[currentFile]||""); }
        else { md.style.display='none'; ifr.style.display='block'; ifr.srcdoc = files['index.html'] || ""; }
    }

    function deleteFile(e, n) { e.stopPropagation(); if(confirm(`${n} を削除？`)){ delete files[n]; openTabs=openTabs.filter(t=>t!==n); if(currentFile===n) switchFile(openTabs[0]||null); else { renderFileList(); renderTabs(); } saveToLocalStorage(); } }
    function toggleModal(id) { 
        if(id==='download-modal') {
            const list = document.getElementById('dl-checklist'); list.innerHTML = '';
            Object.keys(files).forEach(name => { list.innerHTML += `<div><input type="checkbox" value="${name}" checked> ${name}</div>`; });
        }
        document.getElementById(id).style.display='block'; document.getElementById('overlay').style.display='block'; 
    }
    function closeAllModals() { document.querySelectorAll('.custom-modal').forEach(m=>m.style.display='none'); document.getElementById('overlay').style.display='none'; }
    function downloadMultiFiles() {
        const checked = Array.from(document.querySelectorAll('#dl-checklist input:checked')).map(i => i.value);
        const bundle = {}; checked.forEach(n => bundle[n] = files[n]);
        const a = document.createElement("a"); a.href=URL.createObjectURL(new Blob([JSON.stringify(bundle, null, 2)])); a.download="vsc_web_backup.json"; a.click();
    }
    function importSingleFile(e) { const f = e.target.files[0]; if(!f) return; const r = new FileReader(); r.onload=(ev)=>{files[f.name]=ev.target.result; switchFile(f.name);}; r.readAsText(f); }
    function formatDocument() { if(editor) editor.getAction('editor.action.formatDocument').run(); }
    function insertText(t) { editor.executeEdits("", [{ range: editor.getSelection(), text: t, forceMoveMarkers: true }]); editor.focus(); }
    function saveToLocalStorage() { localStorage.setItem('vsc-web-files-v24', JSON.stringify(files)); }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('hidden'); setTimeout(()=>editor.layout(), 210); }
    function clearAllData() { if(confirm("リセットしますか？")){ localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
