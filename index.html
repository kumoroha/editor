<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Visual Studio Code Web+</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/editor/editor.main.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <style>
        :root { 
            --sidebar-width: 220px; --header-height: 55px; --toolbar-height: 40px; --tab-height: 35px;
            --vscode-blue: #007acc; --bg: #1e1e1e; --side-bg: #252526; --head-bg: #323233; --text: #eee;
        }
        body.light { --bg: #ffffff; --side-bg: #f3f3f3; --head-bg: #2c2c2c; --text: #333; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; }
        
        header { height: var(--header-height); background: var(--head-bg); display: flex; align-items: center; padding: 0 15px; justify-content: space-between; border-bottom: 1px solid #2b2b2b; color: white; box-sizing: border-box; }
        .header-left { display: flex; align-items: center; gap: 12px; color: #4fc1ff; font-weight: bold; font-size: 19px; }
        
        #main { display: flex; height: calc(100% - var(--header-height)); width: 100%; position: relative; }
        #sidebar { width: var(--sidebar-width); background: var(--side-bg); display: flex; flex-direction: column; border-right: 1px solid #333; transition: width 0.2s; flex-shrink: 0; }
        #sidebar.hidden { width: 0; border: none; overflow: hidden; }
        
        #editor-wrapper { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); position: relative; }
        #tabs-container { height: var(--tab-height); background: #2d2d2d; display: flex; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid #252526; }
        .tab { padding: 0 15px; height: 100%; display: flex; align-items: center; background: #2d2d2d; font-size: 12px; cursor: pointer; border-right: 1px solid #252526; white-space: nowrap; color: #999; }
        .tab.active { background: var(--bg); color: white; border-top: 1px solid var(--vscode-blue); }
        
        #toolbar { height: var(--toolbar-height); background: var(--side-bg); display: flex; align-items: center; padding: 0 10px; gap: 5px; border-bottom: 1px solid #333; overflow-x: auto; flex-shrink: 0; }
        .tool-btn { background: #3c3c3c; padding: 5px 8px; font-family: monospace; font-size: 14px; min-width: 32px; border-radius: 3px; color: #eee; border: none; }
        .spacer { flex: 1; }

        #editor-container { flex: 1; width: 100%; height: 100%; }
        
        /* Welcome & Settings Tab View */
        #welcome-screen, #settings-view { position: absolute; top: var(--tab-height); left: 0; width: 100%; height: calc(100% - var(--tab-height)); background: var(--bg); z-index: 5; display: none; overflow-y: auto; box-sizing: border-box; }
        #welcome-screen { align-items: center; justify-content: center; flex-direction: column; }
        
        /* 設定画面を左詰め・本家風に */
        #settings-view { padding: 30px 60px; display: none; flex-direction: column; align-items: flex-start; }
        #settings-view h3 { font-size: 24px; font-weight: normal; margin-bottom: 25px; color: #ccc; }
        .setting-item { margin-bottom: 25px; width: 100%; max-width: 600px; }
        .setting-item label { display: block; margin-bottom: 10px; font-size: 14px; color: var(--vscode-blue); }

        .welcome-content { text-align: center; max-width: 500px; }
        .welcome-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #333; color: white; border-radius: 6px; cursor: pointer; border: 1px solid #444; text-align: left; }

        #preview-container { width: 0; height: 100%; background: white; transition: width 0.3s; overflow: hidden; flex-shrink: 0; display: none; }
        #preview-container.visible { width: 50%; border-left: 1px solid #333; display: block; }
        
        .sidebar-title-row { padding: 5px 10px 5px 15px; font-size: 11px; font-weight: bold; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; color: #888; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .add-btn { background:transparent; color:#007acc; font-size: 22px; cursor: pointer; border: none; }
        .file-item { padding: 8px 10px; cursor: pointer; font-size: 13px; display: flex; align-items: center; color: #eee; gap: 5px; }
        .file-item.active { background: rgba(0, 122, 204, 0.2); color: #4fc1ff; }
        .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-actions { display: flex; gap: 12px; opacity: 0.4; padding-right: 5px; }
        .file-item:hover .file-actions { opacity: 1; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; }
        .custom-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #252526; color: white; padding: 25px; border-radius: 8px; border: 1px solid #444; z-index: 1000; width: 340px; box-sizing: border-box; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-modal { font-size: 28px; cursor: pointer; color: #888; line-height: 1; }
        
        select, input { width: 100%; padding: 10px; background: #3c3c3c; color: white; border: 1px solid #555; border-radius: 4px; box-sizing: border-box; }
        button { cursor: pointer; border-radius: 4px; border: none; padding: 8px 12px; }
        hr { border: 0; border-top: 1px solid #444; margin: 20px 0; width: 100%; max-width: 600px; }
    </style>
</head>
<body class="dark">

<header>
    <div class="header-left"><button onclick="toggleSidebar()" style="background:transparent; color:white; font-size:22px; border:none; cursor:pointer;">≡</button><span>Visual Studio Code Web+</span></div>
    <div class="header-right">
        <button id="manual-save-btn" onclick="saveCurrentFileManual()" style="background: #007acc; display: none; color: white;">💾 保存</button>
        <button onclick="toggleSplitPreview()">プレビュー</button>
        <button onclick="fullPreview()" style="background:#444; color:white;">全画面プレビュー</button>
        <button onclick="openDownloadModal()" style="background: #2d7d46; color: white;">ダウンロード</button>
        <button onclick="openSettingsTab()" style="background: #666; color: white;">⚙ 設定</button>
    </div>
</header>

<div id="main">
    <div id="sidebar">
        <div class="sidebar-title-row">
            <span>エクスプローラー</span>
            <div>
                <button class="add-btn" onclick="addNewFile()" title="新規ファイル">+</button>
                <button class="add-btn" style="font-size:16px; margin-left:8px;" onclick="document.getElementById('import-single').click()" title="ファイルをアップロード">⇪</button>
            </div>
        </div>
        <div id="file-list"></div>
        <input type="file" id="import-single" style="display:none" onchange="importSingleFile(event)">
    </div>
    
    <div id="editor-wrapper">
        <div id="tabs-container"></div>
        
        <div id="welcome-screen">
            <div class="welcome-content">
                <h2 style="font-weight:normal;">Visual Studio Code Web+</h2>
                <div class="welcome-btn" onclick="addNewFile()">📄 新規ファイルを作成</div>
                <div class="welcome-btn" onclick="document.getElementById('import-single').click()">⇪ ファイルをアップロード</div>
                <div class="welcome-btn" onclick="openSettingsTab()">⚙ 設定を開く</div>
            </div>
        </div>

        <div id="settings-view">
            <h3>Settings</h3>
            <div class="setting-item"><label>Theme</label><select id="setting-theme" onchange="updateSettings()"><option value="vs-dark">Dark</option><option value="vs">Light</option></select></div>
            <div class="setting-item"><label>Font Size</label><input type="number" id="setting-fontsize" onchange="updateSettings()"></div>
            <div class="setting-item"><label>Tab Size</label><select id="setting-tabsize" onchange="updateSettings()"><option value="2">2</option><option value="4">4</option></select></div>
            <div class="setting-item"><label>Auto Save</label><select id="setting-autosave" onchange="updateSettings()"><option value="on">On</option><option value="off">Off</option></select></div>
            <hr>
            <button onclick="document.getElementById('import-file').click()" style="width:100%; max-width:400px; background:#3c3c3c; color:white; padding:12px; margin-bottom:10px;">JSONから復元</button>
            <input type="file" id="import-file" style="display:none" onchange="importAllData(event)">
            <button onclick="clearAllData()" style="background:#a94442; width:100%; max-width:400px; color:white; padding:12px;">全データ消去</button>
        </div>

        <div id="toolbar">
            <button class="tool-btn" onclick="insertEmmetHtml()" style="background:#8a2be2">!</button>
            <button class="tool-btn" onclick="insertText('\t')">Tab</button>
            <button class="tool-btn" onclick="insertText('{')">{</button><button class="tool-btn" onclick="insertText('}')">}</button>
            <button class="tool-btn" onclick="insertText('[')">[</button><button class="tool-btn" onclick="insertText(']')">]</button>
            <button class="tool-btn" onclick="insertText('(')">(</button><button class="tool-btn" onclick="insertText(')')">)</button>
            <button class="tool-btn" onclick="insertText(':')">:</button><button class="tool-btn" onclick="insertText('=')">=</button>
            <div class="spacer"></div>
            <button class="tool-btn" onclick="editor.getAction('actions.find').run()" style="background:var(--vscode-blue);">🔍 検索</button>
        </div>
        <div id="editor-container"></div>
    </div>
    <div id="preview-container"><iframe id="preview"></iframe><div id="md-preview" style="display:none"></div></div>
</div>

<div class="modal-overlay" id="overlay" onclick="closeAllModals()"></div>

<div id="download-modal" class="custom-modal">
    <div class="modal-header"><h3>📥 ダウンロード</h3><span class="close-modal" onclick="closeAllModals()">&times;</span></div>
    <div id="dl-checklist" style="max-height: 200px; overflow-y: auto; background: #1e1e1e; padding: 10px; border-radius: 4px; border: 1px solid #444; margin-bottom: 12px;"></div>
    <button onclick="downloadMultiFiles()" style="width:100%; background:var(--vscode-blue); color:white;">選択ファイルをJSONで保存</button>
    <hr>
    <button onclick="exportAllData()" style="width:100%; background:#444; color:white;">全バックアップ</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
<script>
    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' }});
    let editor, currentFile = 'index.html', openTabs = ['index.html'], isSettingsOpen = false;
    let files = JSON.parse(localStorage.getItem('vsc-web-files-v22')) || { 'index.html': '<h1>Hello</h1>' };
    let config = JSON.parse(localStorage.getItem('vsc-web-config-v22')) || { theme: 'vs-dark', fontSize: 16, tabSize: 4, autoSave: 'on' };

    require(['vs/editor/editor.main'], function() {
        editor = monaco.editor.create(document.getElementById('editor-container'), {
            value: files[currentFile] || "", language: getLanguage(currentFile), theme: config.theme, fontSize: config.fontSize, tabSize: config.tabSize,
            automaticLayout: true, autoClosingTags: true, autoClosingBrackets: 'always', fixedOverflowWidgets: true, contextmenu: true
        });
        editor.onDidChangeModelContent(() => { 
            if(currentFile && files[currentFile] !== undefined) {
                files[currentFile] = editor.getValue(); 
                if(config.autoSave === 'on') saveToLocalStorage(); 
                updatePreview(); 
            }
        });
        initUI(); renderFileList(); renderTabs(); updateViewVisibility();
    });

    function getLanguage(f) {
        const ext = f.split('.').pop().toLowerCase();
        const map = { html:'html', css:'css', js:'javascript', py:'python', md:'markdown', json:'json', php:'php', sql:'sql', txt:'plaintext' };
        return map[ext] || 'plaintext';
    }

    function renderFileList() {
        const list = document.getElementById('file-list'); list.innerHTML = '';
        Object.keys(files).sort().forEach(name => {
            const div = document.createElement('div'); div.className = `file-item ${name===currentFile?'active':''}`;
            div.innerHTML = `<span class="file-name" onclick="switchFile('${name}')">${name}</span>
                <div class="file-actions"><span onclick="renameFile(event,'${name}')">✏️</span><span onclick="deleteFile(event,'${name}')">×</span></div>`;
            list.appendChild(div);
        });
    }

    function renderTabs() {
        const container = document.getElementById('tabs-container'); container.innerHTML = '';
        openTabs.forEach(name => {
            const tab = document.createElement('div'); tab.className = `tab ${name===currentFile && !isSettingsOpen?'active':''}`;
            tab.innerHTML = `${name} <span style="margin-left:8px;" onclick="closeTab(event,'${name}')">×</span>`;
            tab.onclick = () => switchFile(name);
            container.appendChild(tab);
        });
        if(isSettingsOpen) {
            const sTab = document.createElement('div'); sTab.className = `tab active`;
            sTab.innerHTML = `Settings <span style="margin-left:8px;" onclick="closeSettingsTab(event)">×</span>`;
            container.appendChild(sTab);
        }
    }

    function updateViewVisibility() {
        const welcome = document.getElementById('welcome-screen');
        const settings = document.getElementById('settings-view');
        const editorCont = document.getElementById('editor-container');
        const toolbar = document.getElementById('toolbar');

        welcome.style.display = (openTabs.length === 0 && !isSettingsOpen) ? 'flex' : 'none';
        settings.style.display = isSettingsOpen ? 'flex' : 'none';
        
        if (isSettingsOpen || openTabs.length === 0) {
            editorCont.style.display = 'none';
            toolbar.style.display = 'none';
        } else {
            editorCont.style.display = 'block';
            toolbar.style.display = 'flex';
            if(editor) editor.layout();
            updatePreview();
        }
        renderTabs();
    }

    function switchFile(name) {
        isSettingsOpen = false;
        currentFile = name; if(!openTabs.includes(name)) openTabs.push(name);
        editor.setValue(files[name] || "");
        monaco.editor.setModelLanguage(editor.getModel(), getLanguage(name));
        renderFileList(); updateViewVisibility();
    }

    function openSettingsTab() { isSettingsOpen = true; updateViewVisibility(); }
    function closeSettingsTab(e) { if(e) e.stopPropagation(); isSettingsOpen = false; updateViewVisibility(); }

    function closeTab(e, n) { 
        e.stopPropagation(); 
        openTabs = openTabs.filter(t => t !== n); 
        if(currentFile === n) currentFile = openTabs[openTabs.length-1] || null;
        updateViewVisibility();
    }

    function addNewFile() {
        const name = prompt("ファイル名:");
        if (name && !files[name]) {
            if (getLanguage(name) === 'plaintext' && !confirm("未対応の拡張子です。続行しますか？")) return;
            files[name] = ""; switchFile(name);
        }
    }

    function renameFile(e, oldName) {
        e.stopPropagation();
        const newName = prompt("新しい名前:", oldName);
        if(!newName || newName === oldName) return;
        const oldExt = oldName.split('.').pop(), newExt = newName.split('.').pop();
        if(oldExt !== newExt && !confirm("拡張子を変更しますか？")) return;
        files[newName] = files[oldName]; delete files[oldName];
        openTabs = openTabs.map(t => t === oldName ? newName : t);
        if(currentFile === oldName) currentFile = newName;
        saveToLocalStorage(); renderFileList(); renderTabs();
    }

    function deleteFile(e, n) { 
        e.stopPropagation(); 
        if(confirm(`${n} を削除しますか？`)){ 
            delete files[n]; openTabs = openTabs.filter(t=>t!==n); 
            if(currentFile === n) currentFile = openTabs[0] || null;
            saveToLocalStorage(); renderFileList(); updateViewVisibility();
        } 
    }

    function saveCurrentFileManual() { saveToLocalStorage(); const btn = document.getElementById('manual-save-btn'); btn.innerText = "✅ 保存済"; setTimeout(() => btn.innerText = "💾 保存", 1000); }
    function saveToLocalStorage() { localStorage.setItem('vsc-web-files-v22', JSON.stringify(files)); }
    function toggleModal(id) { closeAllModals(); document.getElementById(id).style.display='block'; document.getElementById('overlay').style.display='block'; }
    function closeAllModals() { document.querySelectorAll('.custom-modal').forEach(m=>m.style.display='none'); document.getElementById('overlay').style.display='none'; }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('hidden'); setTimeout(() => editor.layout(), 210); }
    function toggleSplitPreview() { document.getElementById('preview-container').classList.toggle('visible'); setTimeout(() => editor.layout(), 310); updatePreview(); }
    function fullPreview() { const w = window.open(); w.document.write(document.getElementById('preview').srcdoc || ""); }

    function updatePreview() {
        if(!currentFile) return;
        const isMd = currentFile.endsWith('.md'), ifr = document.getElementById('preview'), md = document.getElementById('md-preview');
        const container = document.getElementById('preview-container');
        if(isMd) { ifr.style.display='none'; md.style.display='block'; container.style.background='#fff'; md.innerHTML=marked.parse(files[currentFile]||""); }
        else { md.style.display='none'; ifr.style.display='block'; container.style.background='white'; let h = files['index.html']||""; if(files['style.css']) h+=`<style>${files['style.css']}</style>`; if(files['script.js']) h+=`<script>${files['script.js']}<\/script>`; ifr.srcdoc=h; }
    }

    function updateSettings() {
        config.theme = document.getElementById('setting-theme').value;
        config.fontSize = parseInt(document.getElementById('setting-fontsize').value);
        config.tabSize = parseInt(document.getElementById('setting-tabsize').value);
        config.autoSave = document.getElementById('setting-autosave').value;
        monaco.editor.setTheme(config.theme); editor.updateOptions({ fontSize: config.fontSize, tabSize: config.tabSize });
        document.body.className = config.theme === 'vs' ? 'light' : 'dark';
        document.getElementById('manual-save-btn').style.display = (config.autoSave === 'off') ? 'block' : 'none';
        localStorage.setItem('vsc-web-config-v22', JSON.stringify(config));
    }

    function initUI() {
        document.getElementById('setting-theme').value = config.theme;
        document.getElementById('setting-fontsize').value = config.fontSize;
        document.getElementById('setting-tabsize').value = config.tabSize;
        document.getElementById('setting-autosave').value = config.autoSave;
        document.body.className = config.theme === 'vs' ? 'light' : 'dark';
        document.getElementById('manual-save-btn').style.display = (config.autoSave === 'off') ? 'block' : 'none';
    }

    function openDownloadModal() {
        const list = document.getElementById('dl-checklist'); list.innerHTML = '';
        Object.keys(files).sort().forEach(name => {
            const item = document.createElement('div'); item.style.display='flex'; item.style.alignItems='center'; item.style.gap='10px'; item.style.padding='5px 0';
            item.innerHTML = `<input type="checkbox" value="${name}" checked><span>${name}</span>`;
            list.appendChild(item);
        });
        toggleModal('download-modal');
    }

    function downloadMultiFiles() {
        const checked = Array.from(document.querySelectorAll('#dl-checklist input:checked')).map(i => i.value);
        if(checked.length === 0) return;
        const bundle = {}; checked.forEach(n => bundle[n] = files[n]);
        const a = document.createElement("a"); a.href=URL.createObjectURL(new Blob([JSON.stringify(bundle, null, 2)])); a.download="backup.json"; a.click();
    }
    
    function insertText(t) { editor.executeEdits("", [{ range: editor.getSelection(), text: t, forceMoveMarkers: true }]); editor.focus(); }
    function insertEmmetHtml() { insertText(`<!DOCTYPE html>\n<html>\n<head>\n<meta charset="UTF-8">\n</head>\n<body>\n\n</body>\n</html>`); }
    function exportAllData() { const b = new Blob([JSON.stringify({files, config})], {type:"application/json"}); const a = document.createElement("a"); a.href=URL.createObjectURL(b); a.download="all_data.json"; a.click(); }
    function importAllData(e) { const r = new FileReader(); r.onload=(ev)=>{const d=JSON.parse(ev.target.result); files=d.files; config=d.config; saveToLocalStorage(); location.reload();}; r.readAsText(e.target.files[0]); }
    function importSingleFile(e) { const f = e.target.files[0]; if(!f) return; const r = new FileReader(); r.onload=(ev)=>{files[f.name]=ev.target.result; switchFile(f.name);}; r.readAsText(f); }
    function clearAllData() { if(confirm("消去しますか？")){ localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
