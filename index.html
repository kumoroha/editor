<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Visual Studio Code Web+ Professional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/editor/editor.main.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <style>
        :root { 
            --sidebar-width: 220px; --header-height: 55px; --toolbar-height: 45px; --tab-height: 35px; --status-height: 25px;
            --vscode-blue: #007acc; --bg: #1e1e1e; --side-bg: #252526; --head-bg: #323233; --text: #eee; --border: #333;
        }
        body.light { --bg: #ffffff; --side-bg: #f3f3f3; --head-bg: #2c2c2c; --text: #333; --border: #ccc; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; }
        
        header { height: var(--header-height); background: var(--head-bg); display: flex; align-items: center; padding: 0 15px; justify-content: space-between; border-bottom: 1px solid #2b2b2b; color: white; box-sizing: border-box; z-index: 100; }
        .header-left { display: flex; align-items: center; gap: 12px; color: #4fc1ff; font-weight: bold; font-size: 19px; }
        
        #main { display: flex; height: calc(100% - var(--header-height) - var(--status-height)); width: 100%; position: relative; }
        #sidebar { width: var(--sidebar-width); background: var(--side-bg); display: flex; flex-direction: column; border-right: 1px solid var(--border); transition: width 0.2s; flex-shrink: 0; }
        #sidebar.hidden { width: 0; border: none; overflow: hidden; }
        
        #editor-wrapper { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); position: relative; }
        #tabs-container { height: var(--tab-height); background: #2d2d2d; display: flex; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--border); }
        body.light #tabs-container { background: #ececec; }
        
        .tab { padding: 0 10px 0 15px; height: 100%; display: flex; align-items: center; background: #2d2d2d; font-size: 12px; cursor: pointer; border-right: 1px solid var(--border); color: #999; white-space: nowrap; transition: 0.2s; }
        body.light .tab { background: #e1e1e1; color: #666; }
        .tab.active { background: var(--bg); color: white; border-top: 1px solid var(--vscode-blue); }
        body.light .tab.active { color: #333; border-top: 2px solid var(--vscode-blue); background: var(--bg); }
        .close-tab-btn { margin-left: 10px; font-size: 16px; width: 20px; text-align: center; }

        #toolbar { height: var(--toolbar-height); background: var(--side-bg); display: flex; align-items: center; padding: 0 10px; gap: 6px; border-bottom: 1px solid var(--border); overflow-x: auto; flex-shrink: 0; }
        .tool-btn { background: #3c3c3c; padding: 6px 10px; font-size: 15px; border-radius: 4px; color: #eee; border: none; flex-shrink: 0; min-width: 35px; }
        body.light .tool-btn { background: #ddd; color: #333; }

        #status-bar { height: var(--status-height); background: var(--vscode-blue); color: white; display: flex; align-items: center; padding: 0 40px; font-size: 11px; justify-content: space-between; }
        
        #editor-container { flex: 1; width: 100%; height: 100%; }
        
        #welcome-screen, #settings-view { position: absolute; top: var(--tab-height); left: 0; width: 100%; height: calc(100% - var(--tab-height)); background: var(--bg); z-index: 50; display: none; overflow-y: auto; padding: 30px; box-sizing: border-box; }
        #settings-view { flex-direction: column; align-items: flex-start; }
        .setting-item { margin-bottom: 20px; width: 100%; max-width: 500px; }

        #preview-container { width: 0; height: 100%; background: white; transition: width 0.3s; overflow: hidden; border-left: 1px solid var(--border); }
        #preview-container.visible { width: 50%; }
        
        .file-item { padding: 10px; cursor: pointer; font-size: 14px; display: flex; align-items: center; color: var(--text); border-bottom: 1px solid rgba(255,255,255,0.02); }
        .file-item.active { background: rgba(0, 122, 204, 0.2); border-left: 3px solid var(--vscode-blue); }
        .file-actions { margin-left: auto; opacity: 0.6; font-size: 18px; }

        .custom-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #252526; color: white; padding: 25px; border-radius: 8px; border: 1px solid #444; z-index: 1000; width: 85%; max-width: 400px; }
        body.light .custom-modal { background: #fff; color: #333; border: 1px solid #ccc; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; }
        
        input, select { width: 100%; padding: 10px; margin-top: 5px; background: #3c3c3c; color: #fff; border: 1px solid #555; border-radius: 4px; font-size: 16px; }
        body.light input, body.light select { background: #fff; color: #333; border: 1px solid #ccc; }
        .action-btn { padding: 10px 20px; border-radius: 4px; border: none; font-size: 14px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body class="dark">

<header>
    <div class="header-left"><button onclick="toggleSidebar()" style="background:none; color:white; font-size:24px; border:none;">≡</button><span>VS Code Web+</span></div>
    <div class="header-right">
        <button onclick="toggleSplitPreview()" style="background:#444; color:white; border-radius:4px; padding:8px 12px; border:none;">分割表示</button>
        <button onclick="fullPreview()" style="background:#555; color:white; border-radius:4px; padding:8px 12px; border:none; margin:0 5px;">全画面</button>
        <button onclick="toggleModal('download-modal')" style="background: #2d7d46; color: white; border-radius:4px; padding:8px 12px; border:none;">保存</button>
        <button onclick="openSettingsTab()" style="background: #666; color: white; border-radius:4px; padding:8px 12px; border:none; margin-left:5px;">⚙</button>
    </div>
</header>

<div id="main">
    <div id="sidebar">
        <div style="padding:15px 10px; font-size:12px; font-weight:bold; color:#888; display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid var(--border);">
            エクスプローラー
            <div>
                <button onclick="addNewFile()" style="background:none; color:var(--vscode-blue); font-size:22px; border:none;">+</button>
                <button onclick="document.getElementById('import-single').click()" style="background:none; color:var(--vscode-blue); font-size:18px; border:none; margin-left:8px;">⇪</button>
            </div>
        </div>
        <div id="file-list" style="overflow-y:auto; flex:1;"></div>
        <input type="file" id="import-single" style="display:none" onchange="importSingleFile(event)">
    </div>
    
    <div id="editor-wrapper">
        <div id="tabs-container"></div>
        
        <div id="welcome-screen">
            <h2 style="font-weight:normal; color:var(--vscode-blue);">Welcome</h2>
            <button onclick="addNewFile()" style="width:300px; padding:18px; margin:10px; background:#333; color:white; border:1px solid #444; text-align:left; border-radius:8px;">📄 新規ファイルを作成</button>
            <button onclick="document.getElementById('import-single').click()" style="width:300px; padding:18px; margin:10px; background:#333; color:white; border:1px solid #444; text-align:left; border-radius:8px;">⇪ ファイルを読み込む</button>
        </div>

        <div id="settings-view">
            <h2 style="margin-bottom:20px;">エディタ設定</h2>
            <div class="setting-item"><label>テーマ</label><select id="setting-theme" onchange="updateSettings()"><option value="vs-dark">Dark</option><option value="vs">Light</option></select></div>
            <div class="setting-item"><label>フォントサイズ</label><input type="number" id="setting-fontsize" onchange="updateSettings()"></div>
            <div class="setting-item"><label>インデント (Tab Size)</label><select id="setting-tabsize" onchange="updateSettings()"><option value="2">2</option><option value="4">4</option></select></div>
            <div class="setting-item"><label>行の折り返し</label><select id="setting-wrap" onchange="updateSettings()"><option value="on">On</option><option value="off">Off</option></select></div>
            <div class="setting-item"><label>ミニマップ</label><select id="setting-minimap" onchange="updateSettings()"><option value="true">表示</option><option value="false">非表示</option></select></div>
            <hr style="width:100%; border:0; border-top:1px solid var(--border); margin:10px 0;">
            <button onclick="document.getElementById('import-file').click()" class="action-btn" style="background:#444; color:white; width:100%;">JSONから復元（インポート）</button>
            <input type="file" id="import-file" style="display:none" onchange="importAllData(event)">
            <button onclick="clearAllData()" class="action-btn" style="background:#a94442; color:white; width:100%;">全データ消去</button>
            <button onclick="closeSettings()" class="action-btn" style="background:var(--vscode-blue); color:white; width:100%;">完了</button>
        </div>

        <div id="toolbar">
            <button class="tool-btn" onclick="insertEmmetHtml()" style="background:#8a2be2">!</button>
            <button class="tool-btn" onclick="insertText('\t')">Tab</button>
            <button class="tool-btn" onclick="insertText('{')">{</button><button class="tool-btn" onclick="insertText('}')">}</button>
            <button class="tool-btn" onclick="insertText('<')">&lt;</button><button class="tool-btn" onclick="insertText('>')">&gt;</button>
            <button class="tool-btn" onclick="insertText('\"')">"</button><button class="tool-btn" onclick="insertText('\'')">'</button>
            <button class="tool-btn" onclick="insertText('/')">/</button><button class="tool-btn" onclick="insertText(';')">;</button>
            <div style="flex:1"></div>
            <button class="tool-btn" onclick="editor.focus(); editor.getAction('actions.find').run();" style="background:var(--vscode-blue);">🔍 検索</button>
        </div>
        <div id="editor-container"></div>
    </div>
    
    <div id="preview-container">
        <iframe id="preview" style="width:100%; height:100%; border:none; background:white;"></iframe>
        <div id="md-preview" style="display:none; padding:25px; color:#333; background:#fff; height:100%; overflow-y:auto; box-sizing:border-box;"></div>
    </div>
</div>

<div id="status-bar">
    <div id="status-left">Ready</div>
    <div id="status-right">UTF-8 | <span id="status-lang">plaintext</span></div>
</div>

<div class="modal-overlay" id="overlay" onclick="closeAllModals()"></div>
<div id="download-modal" class="custom-modal">
    <h3 style="margin-top:0;">📥 保存するファイル</h3>
    <div id="dl-checklist" style="max-height:200px; overflow-y:auto; margin:15px 0; border:1px solid var(--border); padding:10px; background:rgba(0,0,0,0.1); border-radius:4px;"></div>
    <button onclick="downloadMultiFiles()" style="width:100%; background:var(--vscode-blue); color:white; border:none; padding:12px; border-radius:4px; font-size:16px;">JSON形式で保存</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
<script>
    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' }});
    let editor, currentFile = null, openTabs = [];
    let files = JSON.parse(localStorage.getItem('vsc-web-files-v25')) || { 'index.html': '<h1>Hello</h1>' };
    let config = JSON.parse(localStorage.getItem('vsc-web-config-v25')) || { theme: 'vs-dark', fontSize: 16, tabSize: 4, wrap: 'on', minimap: false };

    require(['vs/editor/editor.main'], function() {
        editor = monaco.editor.create(document.getElementById('editor-container'), {
            value: "", language: 'html', theme: config.theme, fontSize: config.fontSize, tabSize: config.tabSize,
            wordWrap: config.wrap, minimap: { enabled: config.minimap }, automaticLayout: true,
            autoClosingBrackets: 'always', autoClosingTags: true
        });

        editor.onDidChangeModelContent(() => { if(currentFile) { files[currentFile] = editor.getValue(); saveToLocalStorage(); updatePreview(); } });
        editor.onDidChangeCursorPosition(e => { document.getElementById('status-left').innerText = `行 ${e.position.lineNumber}, 列 ${e.position.column}`; });

        initUI();
        if(Object.keys(files).length > 0) switchFile(Object.keys(files)[0]);
    });

    function getLanguage(f) {
        const ext = f.split('.').pop().toLowerCase();
        const map = { html:'html', css:'css', js:'javascript', py:'python', md:'markdown', json:'json', php:'php' };
        return map[ext] || 'plaintext';
    }

    function switchFile(name) {
        if(!name) { currentFile = null; updateViewVisibility(); return; }
        currentFile = name;
        if(!openTabs.includes(name)) openTabs.push(name);
        document.getElementById('settings-view').style.display = 'none';
        editor.setValue(files[name] || "");
        monaco.editor.setModelLanguage(editor.getModel(), getLanguage(name));
        document.getElementById('status-lang').innerText = getLanguage(name);
        renderFileList(); renderTabs(); updateViewVisibility();
    }

    function renderFileList() {
        const list = document.getElementById('file-list'); list.innerHTML = '';
        Object.keys(files).sort().forEach(name => {
            const div = document.createElement('div'); div.className = `file-item ${name===currentFile?'active':''}`;
            div.innerHTML = `<span onclick="switchFile('${name}')" style="flex:1;">${name}</span>
                <span onclick="deleteFile(event,'${name}')" class="file-actions">×</span>`;
            list.appendChild(div);
        });
    }

    function renderTabs() {
        const container = document.getElementById('tabs-container'); container.innerHTML = '';
        openTabs.forEach(name => {
            const tab = document.createElement('div'); tab.className = `tab ${name===currentFile?'active':''}`;
            tab.innerHTML = `<span>${name}</span><span class="close-tab-btn" onclick="closeTab(event,'${name}')">×</span>`;
            tab.onclick = () => switchFile(name);
            container.appendChild(tab);
        });
    }

    function updateViewVisibility() {
        const hasTabs = openTabs.length > 0;
        const isSetting = document.getElementById('settings-view').style.display === 'block';
        document.getElementById('welcome-screen').style.display = (!hasTabs && !isSetting) ? 'flex' : 'none';
        document.getElementById('toolbar').style.display = (hasTabs && !isSetting) ? 'flex' : 'none';
        document.getElementById('editor-container').style.display = (hasTabs && !isSetting) ? 'block' : 'none';
        if(editor) editor.layout();
        updatePreview();
    }

    function openSettingsTab() { document.getElementById('settings-view').style.display = 'flex'; updateViewVisibility(); }
    function closeSettings() { document.getElementById('settings-view').style.display = 'none'; if(openTabs.length > 0) switchFile(currentFile); else updateViewVisibility(); }

    function updateSettings() {
        config.theme = document.getElementById('setting-theme').value;
        config.fontSize = parseInt(document.getElementById('setting-fontsize').value);
        config.tabSize = parseInt(document.getElementById('setting-tabsize').value);
        config.wrap = document.getElementById('setting-wrap').value;
        config.minimap = document.getElementById('setting-minimap').value === 'true';
        monaco.editor.setTheme(config.theme);
        editor.updateOptions({ fontSize: config.fontSize, tabSize: config.tabSize, wordWrap: config.wrap, minimap: { enabled: config.minimap } });
        document.body.className = config.theme === 'vs' ? 'light' : 'dark';
        saveToLocalStorage();
    }

    function initUI() {
        document.getElementById('setting-theme').value = config.theme;
        document.getElementById('setting-fontsize').value = config.fontSize;
        document.getElementById('setting-tabsize').value = config.tabSize;
        document.getElementById('setting-wrap').value = config.wrap;
        document.getElementById('setting-minimap').value = config.minimap.toString();
        document.body.className = config.theme === 'vs' ? 'light' : 'dark';
    }

    function closeTab(e, n) { e.stopPropagation(); openTabs = openTabs.filter(t => t !== n); if(currentFile === n) switchFile(openTabs[openTabs.length-1] || null); else renderTabs(); }
    function addNewFile() { const name = prompt("ファイル名 (例: index.html):"); if (name) { if(!files[name]) files[name] = ""; switchFile(name); } }
    function toggleSplitPreview() { const pc = document.getElementById('preview-container'); pc.classList.toggle('visible'); setTimeout(()=>editor.layout(), 310); updatePreview(); }
    function fullPreview() { const w = window.open(); w.document.write(files['index.html'] || "No content"); }
    
    function updatePreview() {
        if(!currentFile) return;
        const isMd = currentFile.endsWith('.md'), ifr = document.getElementById('preview'), md = document.getElementById('md-preview');
        if(isMd) { ifr.style.display='none'; md.style.display='block'; md.innerHTML=marked.parse(files[currentFile]||""); }
        else { md.style.display='none'; ifr.style.display='block'; ifr.srcdoc = files['index.html'] || ""; }
    }

    function deleteFile(e, n) { e.stopPropagation(); if(confirm(`${n} を削除しますか？`)){ delete files[n]; openTabs=openTabs.filter(t=>t!==n); switchFile(openTabs[0]||null); saveToLocalStorage(); } }
    function toggleModal(id) { 
        if(id==='download-modal') {
            const list = document.getElementById('dl-checklist'); list.innerHTML = '';
            Object.keys(files).forEach(name => { list.innerHTML += `<div style="padding:8px; font-size:16px;"><input type="checkbox" value="${name}" checked style="width:20px; height:20px; vertical-align:middle;"> ${name}</div>`; });
        }
        document.getElementById(id).style.display='block'; document.getElementById('overlay').style.display='block'; 
    }
    function closeAllModals() { document.querySelectorAll('.custom-modal').forEach(m=>m.style.display='none'); document.getElementById('overlay').style.display='none'; }
    function downloadMultiFiles() {
        const checked = Array.from(document.querySelectorAll('#dl-checklist input:checked')).map(i => i.value);
        const bundle = { files: {}, config: config };
        checked.forEach(n => bundle.files[n] = files[n]);
        const a = document.createElement("a"); a.href=URL.createObjectURL(new Blob([JSON.stringify(bundle, null, 2)])); a.download="vsc_web_backup.json"; a.click();
    }
    function importAllData(e) {
        const f = e.target.files[0]; if(!f) return;
        const r = new FileReader(); r.onload=(ev)=>{ 
            const data = JSON.parse(ev.target.result); 
            files = data.files || data; config = data.config || config; 
            saveToLocalStorage(); location.reload();
        }; r.readAsText(f);
    }
    function importSingleFile(e) { const f = e.target.files[0]; if(!f) return; const r = new FileReader(); r.onload=(ev)=>{files[f.name]=ev.target.result; switchFile(f.name);}; r.readAsText(f); }
    function insertText(t) { editor.executeEdits("", [{ range: editor.getSelection(), text: t, forceMoveMarkers: true }]); editor.focus(); }
    function insertEmmetHtml() { insertText(`<!DOCTYPE html>\n<html lang="ja">\n<head>\n<meta charset="UTF-8">\n<title>Document</title>\n</head>\n<body>\n\n</body>\n</html>`); }
    function saveToLocalStorage() { localStorage.setItem('vsc-web-files-v25', JSON.stringify(files)); localStorage.setItem('vsc-web-config-v25', JSON.stringify(config)); }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('hidden'); setTimeout(()=>editor.layout(), 210); }
    function clearAllData() { if(confirm("全データを消去してリセットしますか？")){ localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
